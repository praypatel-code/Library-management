{% extends "library/base.html" %}
{% block title %}Edit Book{% endblock %}
{% block content %}
<h3 class="mb-3">Edit Book</h3>
<div class="card p-4">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Book Name</label>
        <input name="title" class="form-control" value="{{ book.title }}" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Book Image</label>
        <input type="file" name="image" class="form-control">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Author</label>
        <select name="author" class="form-select">
          {% for a in authors %}
            <option value="{{ a.id }}" {% if a.id == book.author_id %}selected{% endif %}>{{ a.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">ISBN</label>
        <input name="isbn" class="form-control" value="{{ book.isbn }}" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
          {% for opt in "Fiction,Non-Fiction,Science,Technology,History,Biography,Other".split(",") %}
            <option {% if opt == book.category %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Publication Date</label>
        <input type="date" name="publication_date" class="form-control" value="{{ book.publication_date|date:'Y-m-d' }}">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Total Copies</label>
        <input type="number" min="1" name="total_copies" class="form-control" value="{{ book.total_copies }}" required>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Available Copies</label>
        <input class="form-control" value="{{ book.available_copies }}" disabled>
      </div>
    </div>
    <button class="btn btn-accent">Update</button>
  </form>
</div>
{% endblock %}
